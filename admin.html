<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Frames By Anooj</title>
    <!-- <link rel="stylesheet" href="admin-style.css"> -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    /* --- Admin Dashboard Base Styles --- */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

body { background-color: #f4f7f6; color: #333; }

.admin-container { display: flex; min-height: 100vh; }

/* --- Sidebar --- */
.sidebar { width: 250px; background-color: #1a1a1a; color: white; padding: 20px 0; }
.sidebar .logo { font-size: 1.5rem; font-weight: bold; text-align: center; padding-bottom: 20px; border-bottom: 1px solid #333; margin-bottom: 20px; color: #e6b800; }
.admin-menu { list-style: none; }
.admin-menu li a { display: block; padding: 15px 25px; color: #ccc; text-decoration: none; transition: 0.3s; }
.admin-menu li a i { margin-right: 10px; }
.admin-menu li:hover a, .admin-menu li.active a { background-color: #333; color: #e6b800; border-left: 4px solid #e6b800; }

/* --- Main Content --- */
.main-content { flex: 1; padding: 30px; }
.admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }

/* --- Upload Form --- */
.upload-section, .manage-section { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
.upload-section h3, .manage-section h3 { margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }

.form-group { margin-bottom: 15px; }
.form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
.form-group select, .form-group input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }

.btn-primary { background-color: #e6b800; color: #000; border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.3s; }
.btn-primary:hover { background-color: #ccaa00; }

/* --- Gallery Grid --- */
.admin-gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
.admin-card { background: #fff; border: 1px solid #eee; border-radius: 6px; overflow: hidden; }
.admin-card img { width: 100%; height: 150px; object-fit: cover; display: block; }
.card-details { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
.badge { background: #eee; padding: 3px 8px; border-radius: 12px; font-size: 0.8rem; }
.btn-delete { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
.btn-delete:hover { background: #cc0000; }
  </style>
  
</head>
<body>

    <div class="admin-container">
        <aside class="sidebar">
            <div class="logo">FRAMES ADMIN</div>
            <ul class="admin-menu">
                <li class="active"><a href="#"><i class="fas fa-images"></i> Manage Gallery</a></li>
                <li><a href="#"><i class="fas fa-cog"></i> Settings</a></li>
                <li><a href="index.html"><i class="fas fa-globe"></i> View Live Site</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="admin-header">
                <h2>Gallery Management</h2>
                <div class="user-profile">
                    <span>Welcome, Anooj</span>
                </div>
            </header>

            <section class="upload-section">
                <h3><i class="fas fa-cloud-upload-alt"></i> Upload New Work</h3>
                <form id="uploadForm" class="upload-form">
                    <div class="form-group">
                        <label for="category">Category:</label>
                        <select id="category" name="category">
                            <option value="automotive">Automotive & Motography</option>
                            <option value="portraits">Portraits & Portfolio</option>
                            <option value="events">Event & Hybrid Coverage</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="photoUpload">Select Photo:</label>
                        <input type="file" id="photoUpload" name="photoUpload" accept="image/png, image/jpeg, image/webp" required>
                    </div>

                    <button type="submit" class="btn-primary">Upload Photo</button>
                </form>
            </section>

            <section class="manage-section">
                <h3><i class="fas fa-th"></i> Current Portfolio</h3>
                
                <div class="admin-gallery-grid" id="adminGallery">
                    <div class="admin-card">
                        <img src="images/auto1.jpg" alt="Automotive Shot">
                        <div class="card-details">
                            <span class="badge">Automotive</span>
                            <button class="btn-delete" onclick="deletePhoto(this)"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    </div>
                     <div class="admin-card">
                        <img src="images/portrait1.jpg" alt="Portrait Shot">
                        <div class="card-details">
                            <span class="badge">Portraits</span>
                            <button class="btn-delete" onclick="deletePhoto(this)"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
      // Handle the upload form submission (UI Simulation)
document.getElementById('uploadForm').addEventListener('submit', function(e) {
    e.preventDefault(); // Stop the page from refreshing

    const category = document.getElementById('category').value;
    const fileInput = document.getElementById('photoUpload');
    
    if (fileInput.files.length > 0) {
        const fileName = fileInput.files[0].name;
        
        // In a real app, this is where you would send the file to your Node.js backend
        alert(`Success! Simulated upload of "${fileName}" to the "${category}" category.`);
        
        // Reset the form
        this.reset();
    } else {
        alert("Please select a file to upload.");
    }
});

// Handle the delete button (UI Simulation)
function deletePhoto(buttonElement) {
    // Confirm before deleting
    if(confirm("Are you sure you want to delete this photo from your portfolio?")) {
        
        // Find the parent card and remove it from the screen
        const card = buttonElement.closest('.admin-card');
        card.style.display = 'none';
        
        // In a real app, you would send a DELETE request to your backend database here
        console.log("Image deleted from UI. Backend connection required for permanent deletion.");
    }
}
    </script>
</body>
</html>
